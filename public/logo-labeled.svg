<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none" role="img" aria-label="maxstash">
  <defs>
    <linearGradient id="ms-grad-d" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d28d9" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="ms-text-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#cbd5f5" />
    </linearGradient>
  </defs>
  <!-- Logo + wordmark, horizontally centered as a single group.
       Icon: 44x44 (x=0..44). Gap: 12. Text: 130 wide (x=56..186).
       Total content width = 186; viewBox width = 200; left/right pad = 7. -->
  <g transform="translate(7, 6)">
    <!-- Stacked rounded squares (logo) -->
    <rect x="12" y="12" width="32" height="32" rx="8" fill="url(#ms-grad-d)" fill-opacity="0.3" />
    <rect x="6" y="6" width="32" height="32" rx="8" fill="url(#ms-grad-d)" fill-opacity="0.6" />
    <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#ms-grad-d)" />
    <!-- Wordmark -->
    <text
      x="56"
      y="32"
      textLength="130"
      lengthAdjust="spacingAndGlyphs"
      font-family="'Inter', 'Geist', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
      font-weight="800"
      font-size="30"
      letter-spacing="-1.6"
      fill="url(#ms-text-d)"
    >maxstash</text>
  </g>
</svg>
